.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.card-top { background: #E6F1FB; padding: 1.5rem 1.4rem 1.2rem; display: flex; align-items: center; gap: 14px; }

.sid { font-size: 13px; color: #185FA5; margin-top: 2px; }

.card-body { padding: 1.2rem 1.4rem; display: flex; flex-direction: column; gap: 14px; }
.info-block { display: flex; gap: 12px; align-items: flex-start; }

.icon-wrap i { font-size: 16px; color: var(--color-text-secondary); }
.info-content { flex: 1; }
.info-label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; }
.info-value { font-size: 14px; color: var(--color-text-primary); line-height: 1.6; }
.divider { height: 0.5px; background: var(--color-border-tertiary); }
.progress-bar { display: flex; gap: 3px; margin-top: 1rem; flex-wrap: wrap; }
.dot { height: 4px; flex: 1; border-radius: 2px; background: var(--color-border-tertiary); min-width: 4px; max-width: 20px; }
.dot.active { background: #378ADD; }
.dot.done { background: #B5D4F4; }

.notice { font-size: 12px; color: var(--color-text-tertiary); text-align: center; margin-top: 1rem; }
</style>

</div>

let list = [];
let cur = 0;

function clearError() {
  document.getElementById('errMsg').textContent = '';
}

function onKey(e) {
  if (e.key === 'Enter') tryLogin();
}

function tryLogin() {
  const inputId = document.getElementById('inputId').value.trim();
  const inputName = document.getElementById('inputName').value.trim();

  if (!inputId || !inputName) {
    document.getElementById('errMsg').textContent = '학번과 이름을 모두 입력해 주세요.';
    return;
  }

  const matched = all.filter(d => d.id === inputId && d.name === inputName);

  if (!matched.length) {
    document.getElementById('errMsg').textContent = '학번 또는 이름이 일치하지 않습니다. 다시 확인해 주세요.';
    return;
  }

  list = matched;
  cur = 0;
  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('viewScreen').style.display = 'block';
  render();
}

function goBack() {
  document.getElementById('introScreen').style.display = 'flex';
  document.getElementById('viewScreen').style.display = 'none';
  document.getElementById('inputId').value = '';
  document.getElementById('inputName').value = '';
  document.getElementById('errMsg').textContent = '';
  list = [];
  cur = 0;
}

function move(dir) {
  cur = Math.max(0, Math.min(list.length - 1, cur + dir));
  render();
}

function initials(name) { return name.slice(0,1) + (name.length > 1 ? name.slice(-1) : ''); }

function render() {
  const counterEl = document.getElementById('counter');
  const cardArea = document.getElementById('cardArea');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const progressBar = document.getElementById('progressBar');

  if (!list.length) return;

  const d = list[cur];
  counterEl.textContent = list.length > 1 ? `${cur + 1} / ${list.length}` : '';
  prevBtn.disabled = cur === 0;
  nextBtn.disabled = cur === list.length - 1;
  prevBtn.style.display = list.length > 1 ? 'flex' : 'none';
  nextBtn.style.display = list.length > 1 ? 'flex' : 'none';

  const phones = d.phone.split('\n').map(p => `<div>${p}</div>`).join('');

  cardArea.innerHTML = `
    <div class="card">
      <div class="card-top">
        <div class="avatar">${initials(d.name)}</div>
        <div>
          <div class="name">${d.name}</div>
          <div class="sid">${d.id}</div>
          <span class="hospital-pill">${d.hospital}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="info-block">
          <div class="icon-wrap"><i class="ti ti-building-hospital" aria-hidden="true"></i></div>
          <div class="info-content">
            <div class="info-label">실습기관</div>
            <div class="info-value">${d.hospital}</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-block">
          <div class="icon-wrap"><i class="ti ti-user" aria-hidden="true"></i></div>
          <div class="info-content">
            <div class="info-label">담당자</div>
            <div class="info-value">${d.manager}</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-block">
          <div class="icon-wrap"><i class="ti ti-phone" aria-hidden="true"></i></div>
          <div class="info-content">
            <div class="info-label">연락처</div>
            <div class="info-value">${phones}</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="info-block">
          <div class="icon-wrap"><i class="ti ti-map-pin" aria-hidden="true"></i></div>
          <div class="info-content">
            <div class="info-label">주소</div>
            <div class="info-value">${d.addr}</div>
          </div>
        </div>
      </div>
    </div>
  `;

  if (list.length > 1) {
    progressBar.innerHTML = Array.from({length: list.length}, (_, i) => {
      const cls = i < cur ? 'dot done' : i === cur ? 'dot active' : 'dot';
      return `<div class="${cls}"></div>`;
    }).join('');
  } else {
    progressBar.innerHTML = '';
  }
}
</script>
