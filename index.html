  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f3;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-border-tertiary: rgba(0,0,0,0.12);
      --color-border-secondary: rgba(0,0,0,0.22);
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1e1e1c;
        --color-background-secondary: #2a2a28;
        --color-text-primary: #f0ede8;
        --color-text-secondary: #b4b2a9;
        --color-text-tertiary: #888780;
        --color-border-tertiary: rgba(255,255,255,0.10);
        --color-border-secondary: rgba(255,255,255,0.20);
      }
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-background-secondary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .wrap { padding: 0; min-height: 420px; }

    .intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 420px;
      text-align: center;
      background: var(--color-background-primary);
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--color-border-tertiary);
      padding: 2.5rem 2rem;
    }

    .intro-badge {
      font-size: 12px;
      color: #185FA5;
      background: #E6F1FB;
      padding: 4px 14px;
      border-radius: 100px;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .intro-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--color-text-primary);
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .intro-sub {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .intro-form {
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input[type="text"] {
      width: 100%;
      height: 38px;
      padding: 0 12px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      font-size: 14px;
      font-family: var(--font-sans);
      outline: none;
    }

    input[type="text"]:focus {
      box-shadow: 0 0 0 2px #378ADD55;
      border-color: #378ADD;
    }

    .login-btn {
      width: 100%;
      padding: 10px;
      border-radius: var(--border-radius-md);
      border: none;
      background: #378ADD;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: background 0.15s;
    }

    .login-btn:hover { background: #185FA5; }

    .error-msg {
      font-size: 13px;
      color: #A32D2D;
      text-align: center;
      min-height: 18px;
    }

    .notice {
      font-size: 12px;
      color: var(--color-text-tertiary);
      text-align: center;
      margin-top: 24px;
      line-height: 1.6;
    }

    .view { display: none; }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .counter { font-size: 13px; color: var(--color-text-tertiary); }

    .nav { display: flex; gap: 8px; align-items: center; }

    .nav button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .nav button:hover { background: var(--color-background-secondary); }
    .nav button:disabled { opacity: 0.3; cursor: default; }

    .reset-btn {
      font-size: 12px;
      color: var(--color-text-tertiary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--border-radius-md);
      font-family: var(--font-sans);
    }

    .reset-btn:hover {
      color: var(--color-text-primary);
      background: var(--color-background-secondary);
    }

    .card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      overflow: hidden;
    }

    .card-top {
      background: #E6F1FB;
      padding: 1.5rem 1.4rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #B5D4F4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 500;
      color: #0C447C;
      flex-shrink: 0;
    }

    .student-name { font-size: 22px; font-weight: 500; color: #042C53; }
    .sid { font-size: 13px; color: #185FA5; margin-top: 2px; }

    .hospital-pill {
      display: inline-block;
      background: #E1F5EE;
      color: #085041;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 100px;
      margin-top: 6px;
    }

    .card-body {
      padding: 1.2rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .info-block { display: flex; gap: 12px; align-items: flex-start; }

    .icon-wrap {
      width: 32px;
      height: 32px;
      border-radius: var(--border-radius-md);
      background: var(--color-background-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap i { font-size: 16px; color: var(--color-text-secondary); }

    .info-label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; }
    .info-value { font-size: 14px; color: var(--color-text-primary); line-height: 1.6; }

    .divider { height: 0.5px; background: var(--color-border-tertiary); }

    .progress-bar { display: flex; gap: 3px; margin-top: 1rem; flex-wrap: wrap; }

    .dot { height: 4px; flex: 1; border-radius: 2px; background: var(--color-border-tertiary); min-width: 4px; max-width: 20px; }
    .dot.active { background: #378ADD; }
    .dot.done { background: #B5D4F4; }

    .office-info {
      margin-top: 1.2rem;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .office-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #E6F1FB;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .office-icon i { font-size: 18px; color: #185FA5; }
    .office-label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; }
    .office-phone { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
    .office-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 1px; }
  </style>
</head>

    </div>

function onKey(e) { if (e.key === 'Enter') tryLogin(); }

function tryLogin() {
  const inputId = document.getElementById('inputId').value.trim();
  const inputName = document.getElementById('inputName').value.trim();
  if (!inputId || !inputName) {
    document.getElementById('errMsg').textContent = '학번과 이름을 모두 입력해 주세요.';
    return;
  }
  const matched = all.filter(d => d.id === inputId && d.name === inputName);
  if (!matched.length) {
    document.getElementById('errMsg').textContent = '학번 또는 이름이 일치하지 않습니다. 다시 확인해 주세요.';
    return;
  }
  list = matched; cur = 0;
  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('viewScreen').style.display = 'block';
  render();
}

function goBack() {
  document.getElementById('introScreen').style.display = 'flex';
  document.getElementById('viewScreen').style.display = 'none';
  document.getElementById('officeInfo').style.display = 'none';
  document.getElementById('inputId').value = '';
  document.getElementById('inputName').value = '';
  document.getElementById('errMsg').textContent = '';
  list = []; cur = 0;
}

function move(dir) {
  cur = Math.max(0, Math.min(list.length - 1, cur + dir));
  render();
}

function initials(n) { return n.slice(0,1) + (n.length > 1 ? n.slice(-1) : ''); }

function render() {
  if (!list.length) return;
  const d = list[cur];
  document.getElementById('counter').textContent = list.length > 1 ? `${cur+1} / ${list.length}` : '';
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === list.length - 1;
  document.getElementById('prevBtn').style.display = list.length > 1 ? 'flex' : 'none';
  document.getElementById('nextBtn').style.display = list.length > 1 ? 'flex' : 'none';

  const phones = d.phone.split('\n').map(p => `<div>${p}</div>`).join('');
  document.getElementById('cardArea').innerHTML = `
    <div class="card">
      <div class="card-top">
        <div class="avatar">${initials(d.name)}</div>
        <div>
          <div class="student-name">${d.name}</div>
          <div class="sid">${d.id}</div>
          <span class="hospital-pill">${d.hospital}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="info-block">
          <div class="icon-wrap"><i class="ti ti-building-hospital"></i></div>
          <div><div class="info-label">실습기관</div><div class="info-value">${d.hospital}</div></div>
        </div>
        <div class="divider"></div>
        <div class="info-block">
          <div class="icon-wrap"><i class="ti ti-user"></i></div>
          <div><div class="info-label">담당자</div><div class="info-value">${d.manager}</div></div>
        </div>
        <div class="divider"></div>
        <div class="info-block">
          <div class="icon-wrap"><i class="ti ti-phone"></i></div>
          <div><div class="info-label">연락처</div><div class="info-value">${phones}</div></div>
        </div>
        <div class="divider"></div>
        <div class="info-block">
          <div class="icon-wrap"><i class="ti ti-map-pin"></i></div>
          <div><div class="info-label">주소</div><div class="info-value">${d.addr}</div></div>
        </div>
      </div>
    </div>`;

  document.getElementById('progressBar').innerHTML = list.length > 1
    ? Array.from({length: list.length}, (_, i) =>
        `<div class="dot ${i < cur ? 'done' : i === cur ? 'active' : ''}"></div>`).join('')
    : '';

  document.getElementById('officeInfo').style.display = 'flex';
}
</script>
</body>
</html>
